  <meta charset="UTF-8">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SaaradhiGo">

  <title>vahango</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    function launchRazorpay(options, successCallback, errorCallback) {
      // Normalize options
      var rzpOptions = {
        "key": options.key,
        "amount": parseInt(options.amount), 
        "currency": options.currency || "INR",
        "name": options.name,
        "description": options.description,
        "order_id": options.order_id,
        "prefill": options.prefill || {},
        "notes": options.notes || {},
        "theme": options.theme || { "color": "#EEBD2B" },
        "handler": function (response) {
          successCallback(response.razorpay_payment_id, response.razorpay_order_id, response.razorpay_signature);
        },
        "modal": {
          "ondismiss": function() {
            errorCallback("dismissed", "Payment cancelled by user");
          }
        }
      };

      try {
        var rzp = new Razorpay(rzpOptions);
        rzp.on('payment.failed', function (response){
          errorCallback(response.error.code, response.error.description);
        });
        rzp.open();
      } catch (e) {
        errorCallback("error", e.message || "Failed to launch Razorpay");
      }
    }

    function isRazorpayLoaded() {
      return typeof Razorpay !== 'undefined';
    }
  </script>
</head>
